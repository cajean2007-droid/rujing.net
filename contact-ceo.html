<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系马睿 | 时述智能</title>
    <meta name="description" content="直接与时述智能创始人马睿对话">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #E85A4F;
            --dark: #0d0d1a;
            --darker: #060610;
            --light: #f8f9fa;
            --gray: #8a8a9a;
            --accent: #4a90d9;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            line-height: 1.8;
            color: var(--light);
            background: var(--darker);
            min-height: 100vh;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        
        .logo span {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-btn {
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-btn:hover { color: white; }
        
        /* Main */
        .main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 40px 80px;
        }
        
        .contact-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 60px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 30px;
        }
        
        .contact-card h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .contact-card .title {
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 24px;
        }
        
        .contact-card .desc {
            color: var(--gray);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .qrcode-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .qrcode-box img {
            width: 200px;
            height: 200px;
            display: block;
        }
        
        .qrcode-tip {
            color: var(--gray);
            font-size: 14px;
        }
        
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 40px 0;
        }
        
        .alt-contact {
            text-align: left;
        }
        
        .alt-contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .alt-contact-item span:first-child {
            color: var(--gray);
            width: 60px;
        }
        
        .alt-contact-item a {
            color: var(--light);
            text-decoration: none;
        }
        
        .alt-contact-item a:hover {
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .main { padding: 100px 20px 60px; }
            .contact-card { padding: 40px 24px; }
            .contact-card h1 { font-size: 24px; }
            .qrcode-box img { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">入镜<span>inshot</span></a>
        <a href="/" class="back-btn">← 返回首页</a>
    </nav>
    
    <div class="main">
        <div class="contact-card">
            <div class="avatar">🦁</div>
            <h1>马睿</h1>
            <p class="title">时述智能创始人 & CEO</p>
            <p class="desc">
                扫描二维码，添加我的微信<br/>
                直接聊聊合作可能
            </p>
            
            <div class="qrcode-box">
                <img src="/images/wechat-qr.jpg" alt="微信二维码" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f5f5f5%22 width=%22200%22 height=%22200%22/><text x=%22100%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22>二维码加载中</text></svg>'">
            </div>
            <p class="qrcode-tip">微信扫码添加</p>
            
            <div class="divider"></div>
            
            <div class="alt-contact">
                <div class="alt-contact-item">
                    <span>邮箱</span>
                    <a href="mailto:contact@rujing.net">contact@rujing.net</a>
                </div>
                <div class="alt-contact-item">
                    <span>公司</span>
                    <span>时述智能科技有限公司</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
